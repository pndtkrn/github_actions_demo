name: Deploy application

on:
  push:
    branches:
      - main

jobs:
  testing:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest --cov=app --cov-report=html --cov-report=html --fail-under=90
